name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SOOP-Game-Bot-Windows
          path: |
            dist/*.exe
            dist/*.yml
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
          name: SOOP Game Bot ${{ github.ref_name }}
          body: |
            ## SOOP Game Bot ${{ github.ref_name }}

            ### 설치 방법
            1. 아래 `SOOP-Game-Bot-Setup-*.exe` 파일을 다운로드
            2. 설치 마법사 실행
            3. SOOP 스트리머 아이디로 로그인
            4. 게임 설정 후 OBS 브라우저 소스 URL 복사

            ### 변경사항
            - 자동 릴리즈 빌드
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
