name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync version from git tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $tag
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json -Encoding UTF8
          Write-Host "Set version to $tag"

      - name: Build Electron app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SOOP-Game-Bot-Windows
          path: |
            dist/*.exe
            dist/*.yml
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.yml
          name: SOOP Game Bot ${{ github.ref_name }}
          body: |
            ## SOOP Game Bot ${{ github.ref_name }}

            ### 설치 방법
            1. 아래 `SOOP-Game-Bot-Setup-*.exe` 파일을 다운로드
            2. 설치 마법사 실행
            3. SOOP 스트리머 아이디로 로그인
            4. 게임 설정 후 OBS 브라우저 소스 URL 복사

            ### 변경사항
            - 보스 설정의 구글 시트 동기화 수정 — 저장 시 서버에서 전송(브라우저 CORS 우회)해 실제로 시트에 기록됨
            - 보스 설정 저장이 BR(보스 레이드)에 즉시 반영되도록 수정 (설정 페이지 저장 → 앱/오버레이 반영)
            - 초기 로드 시 보스 상태 미표시("준비중") 버그 수정 (game:all 배열 키잉)
            - 시작 시 공유 서버/시트가 로컬 보스 설정을 빈 값으로 덮어쓰지 않도록 방어
            - SOOP 실제 채팅 연결 (채널 ID만으로 자동 연결) + 열혈팬 감지 강화 (입장·팬클럽 등급)
            - 시뮬레이션 기본 OFF · 게임별 weflab 트리거 단어 · 보스전 화면(준비중/토벌완료) · 대시보드 5:5
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
