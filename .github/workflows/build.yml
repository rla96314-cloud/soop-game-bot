name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync version from git tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $tag
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json -Encoding UTF8
          Write-Host "Set version to $tag"

      - name: Build Electron app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SOOP-Game-Bot-Windows
          path: |
            dist/*.exe
            dist/*.yml
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.yml
          name: SOOP Game Bot ${{ github.ref_name }}
          body: |
            ## SOOP Game Bot ${{ github.ref_name }}

            ### 설치 방법
            1. 아래 `SOOP-Game-Bot-Setup-*.exe` 파일을 다운로드
            2. 설치 마법사 실행
            3. SOOP 스트리머 아이디로 로그인
            4. 게임 설정 후 OBS 브라우저 소스 URL 복사

            ### 변경사항
            - 열혈팬 입장 감지 + 대시보드 패널 추가
            - 시뮬레이션 모드 기본값 OFF (실제 연결이 기본)
            - 게임별 weflab 트리거 단어 설정 추가 (룰렛 결과 단어로 각 게임 발동)
            - 보스전 화면 개편: 설정 시 바로 레이드 화면 · 미설정 시 "준비중" · 처치 시 "토벌 완료" (앱 + OBS 오버레이)
            - 대시보드 좌측 최근 실행기록 / 열혈팬 입장 영역 5:5 분할
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
