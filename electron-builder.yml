appId: com.soop.gamebot
productName: SOOP Game Bot
copyright: Copyright © 2025

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico
  artifactName: "soop-game-bot-setup-${version}.exe"

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icon.png
  artifactName: "soop-game-bot-${version}-${arch}.dmg"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SOOP Game Bot
  license: null

publish:
  provider: generic
  url: https://github.com/your-repo/soop-game-bot/releases/latest/download
